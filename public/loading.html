<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../docs/css/autocomplete.css" />
    <title>LOADING TEST</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        margin-top: 50px;
      }
      p {
        margin: 0;
      }
      .container {
        max-width: 350px;
        margin: 0 auto;
      }
      .loading-item {
        padding: 8px 12px;
        color: #888;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section>
        <h1>Loading test</h1>
        <div class="auto-search-wrapper">
          <input type="text" id="loading" placeholder="type w" />
        </div>
      </section>
    </div>

    <script src="../docs/js/autocomplete.min.js"></script>
    <script>
      new Autocomplete("loading", {
        // no debounce — fetch starts immediately after typing
        delay: 0,

        onSearch: async ({ currentValue }) => {
          const api =
            "https://raw.githubusercontent.com/tomickigrzegorz/autocomplete/master/docs/characters.json";
          const response = await fetch(api);
          const data = await response.json();
          return data
            .sort((a, b) => a.name.localeCompare(b.name))
            .filter((element) =>
              element.name.match(new RegExp(currentValue, "gi"))
            );
        },

        onResults: ({ currentValue, matches }) =>
          matches
            .map(
              (el) => `<li><p>${el.name.replace(
                new RegExp(currentValue, "gi"),
                (str) => `<b>${str}</b>`,
              )}</p></li>`,
            )
            .join(""),

        onLoading: ({ currentValue }) =>
          `<li class="loading-item">Searching for "${currentValue}"…</li>`,
      });
    </script>
  </body>
</html>
