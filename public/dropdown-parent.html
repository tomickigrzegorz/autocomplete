<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../docs/css/autocomplete.css" />
    <title>DROPDOWN PARENT TEST</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        margin-top: 50px;
      }
      p {
        margin: 0;
      }

      .container {
        max-width: 350px;
        margin: 0 auto;
      }

      /* overflow:hidden simulates modal/card clipping scenario */
      .overflow-box {
        overflow: hidden;
        border: 2px solid #ccc;
        border-radius: 8px;
        padding: 16px;
        height: 80px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section>
        <h1>dropdownParent: document.body</h1>
        <!-- overflow:hidden parent — dropdown would be clipped without dropdownParent -->
        <div class="overflow-box">
          <div class="auto-search-wrapper">
            <input type="text" id="dropdown-parent" placeholder="type w" />
          </div>
        </div>
      </section>
    </div>

    <script src="../docs/js/autocomplete.min.js"></script>
    <script>
      const data = [
        { name: "Walter White" },
        { name: "Jesse Pinkman" },
        { name: "Skyler White" },
        { name: "Walter White Jr." },
        { name: "Hank Schrader" },
        { name: "Marie Schrader" },
      ];

      new Autocomplete("dropdown-parent", {
        dropdownParent: document.body,

        onSearch: ({ currentValue }) => {
          return data
            .sort((a, b) => a.name.localeCompare(b.name))
            .filter((element) => {
              return element.name.match(new RegExp(currentValue, "i"));
            });
        },

        onResults: ({ matches }) =>
          matches.map((el) => `<li><p>${el.name}</p></li>`).join(""),

        onSubmit: ({ element, object }) => {
          element.value = object.name;
        },
      });
    </script>
  </body>
</html>
